cors:
  allowed-origins: []

logging:
  level:
    de.uni_passau.fim.se2: INFO

spring:
  application:
    name: litterbox-web
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    enabled-by-default: false

server:
  error:
    include-stacktrace: never
