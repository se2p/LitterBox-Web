cors:
  allowed-origins: []

logging:
  level:
    de.uni_passau.fim.se2: INFO

spring:
  application:
    name: litterbox-web
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    access:
      default: none
  otlp:
    logging:
      export:
        enabled: false
    tracing:
      export:
        enabled: false
    metrics:
      export:
        enabled: false

server:
  error:
    include-stacktrace: never

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: false
  auto-tag-classes: false
